<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار هل تعرفني؟</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background: radial-gradient(circle at center,#14002a,#050510);
height:100vh;
overflow:hidden;
}

/* النجوم */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* العنوان */
h1{
margin-top:60px;
font-size:40px;
text-shadow:0 0 20px #a855ff;
}

/* النقاط */
#scoreBox{
position:absolute;
top:20px;
left:20px;
font-size:20px;
background:rgba(0,0,0,0.4);
padding:10px 15px;
border-radius:10px;
box-shadow:0 0 15px #6a4dff;
}

/* القلب */
.heart{
width:120px;
height:120px;
background:red;
margin:40px auto;
transform:rotate(-45deg);
position:relative;
animation:beat 1s infinite;
cursor:pointer;
box-shadow:0 0 25px red;
}

.heart:before,.heart:after{
content:"";
width:120px;
height:120px;
background:red;
border-radius:50%;
position:absolute;
}

.heart:before{top:-60px}
.heart:after{left:60px}

@keyframes beat{
0%{transform:rotate(-45deg) scale(1)}
50%{transform:rotate(-45deg) scale(1.15)}
100%{transform:rotate(-45deg) scale(1)}
}

/* الاسئلة */
.quiz{
display:none;
margin-top:30px;
}

.question{
font-size:24px;
margin-bottom:20px;
}

button{
padding:12px 25px;
margin:8px;
font-size:18px;
background:#1d1d3a;
border:1px solid #7a5cff;
color:white;
border-radius:10px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px #7a5cff;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px #7a5cff;
}

#result{
margin-top:30px;
font-size:26px;
display:none;
text-shadow:0 0 20px #ff4df0;
}
</style>
</head>

<body>

<div id="scoreBox">النقاط: <span id="score">0</span></div>

<canvas id="stars"></canvas>

<h1>اختبار منية السري</h1>

<div class="heart" id="heart"></div>

<div class="quiz" id="quiz">

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<div id="result"></div>

<script>

/* النجوم */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=0.2;
if(s.y>canvas.height)s.y=0;
});

requestAnimationFrame(drawStars);
}

drawStars();

/* النقاط */
let score=0;

function updateScore(){
document.getElementById("score").innerText=score;
}

/* الاسئلة */
const questions=[
{
q:"ما الشيء الذي أحبه أكثر؟",
a:["التحدث معك","النوم","اللعب"],
correct:0
},
{
q:"هل أنا شخص لطيف؟",
a:["نعم جدا","لا","أحيانا"],
correct:0
},
{
q:"هل هذه الصفحة صنعت خصيصا لك؟",
a:["نعم","لا","لا أعلم"],
correct:0
}
];

let current=0;

function loadQuestion(){

if(current>=questions.length){

let result=document.getElementById("result");
result.style.display="block";

if(score==questions.length){
result.innerHTML="🔥 منية تعرفني تماما! النتيجة: "+score;
}else{
result.innerHTML="✨ نتيجتك "+score+" من "+questions.length;
}

return;
}

let q=questions[current];

document.getElementById("question").innerText=q.q;

let answersHTML="";

q.a.forEach((text,index)=>{
answersHTML+=`<button onclick="answer(${index})">${text}</button>`;
});

document.getElementById("answers").innerHTML=answersHTML;

}

function answer(index){

if(index===questions[current].correct){
score++;
updateScore();
}

current++;

loadQuestion();

}

/* القلب يبدأ الاختبار */
document.getElementById("heart").onclick=function(){
this.style.display="none";
document.getElementById("quiz").style.display="block";
loadQuestion();
};

</script>

</body>
</html>
