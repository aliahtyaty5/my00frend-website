<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رسالة إلى منى</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    color:white;
    background: radial-gradient(circle at center,#0f2027,#203a43,#2c5364);
    overflow:hidden;
}

/* نجوم بالخلفية */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    background-image:radial-gradient(white 1px, transparent 1px);
    background-size:40px 40px;
    opacity:0.15;
}

/* القلب */
.heart{
    width:120px;
    height:120px;
    background:red;
    transform:rotate(-45deg);
    position:relative;
    animation:beat 1s infinite;
    cursor:pointer;
}

.heart:before,
.heart:after{
    content:"";
    width:120px;
    height:120px;
    background:red;
    border-radius:50%;
    position:absolute;
}

.heart:before{
    top:-60px;
    left:0;
}

.heart:after{
    left:60px;
    top:0;
}

@keyframes beat{
    0%{transform:rotate(-45deg) scale(1);}
    50%{transform:rotate(-45deg) scale(1.15);}
    100%{transform:rotate(-45deg) scale(1);}
}

/* كسر القلب */
.broken{
    animation:break 1.5s forwards;
}

@keyframes break{
    0%{opacity:1;}
    100%{
        transform:rotate(-45deg) scale(0.3);
        opacity:0;
    }
}

/* الرسالة */
#message{
    display:none;
    text-align:center;
    font-size:28px;
    margin-top:40px;
    animation:fade 3s;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:40px;
    margin-bottom:30px;
    text-shadow:0 0 20px rgba(255,255,255,0.6);
}

</style>
</head>

<body>

<div class="stars"></div>

<h1>رسالة إلى منى</h1>

<div class="heart" onclick="breakHeart()" id="heart"></div>

<div id="message">
💔 أحياناً يجب أن نترك بعض المشاعر تمضي...<br><br>
منى، ربما محمد ليس الشخص المناسب لك.<br>
الأفضل أن تبحثي عن شخص يقدّرك ويحبك بصدق.<br><br>
الحياة مليئة بقلوب تستحق قلبك ❤️
</div>

<script>

function breakHeart(){

let heart = document.getElementById("heart");
heart.classList.add("broken");

setTimeout(()=>{
document.getElementById("message").style.display="block";
},1200);

}

</script>

</body>
</html>
