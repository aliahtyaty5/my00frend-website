<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منى مايفرندوو</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff9ecf,#ffcce6);
    text-align:center;
    color:white;
}

.container{
    margin-top:100px;
}

h1{
    font-size:60px;
    animation: glow 2s infinite alternate;
}

h2{
    font-size:30px;
}

button{
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff3399;
    cursor:pointer;
    margin-top:30px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ffe6f2;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white;}
    to{ text-shadow:0 0 30px #ff66b3;}
}

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    overflow:hidden;
}

.heart{
    position:absolute;
    color:white;
    animation:fall 6s linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<div class="hearts">
<div class="heart" style="left:10%">❤</div>
<div class="heart" style="left:30%">❤</div>
<div class="heart" style="left:50%">❤</div>
<div class="heart" style="left:70%">❤</div>
<div class="heart" style="left:90%">❤</div>
</div>

<div class="container">

<h1>منى 💖</h1>
<h2>هل تعرفينني حقًا؟</h2>

<p>لدي لعبة صغيرة لك</p>

<button onclick="startGame()">ابدئي اللعبة</button>

</div>

<script>
function startGame(){
alert("لنرى هل تعرفينني جيدًا 😄");
}
</script>

</body>
  </html>
