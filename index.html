<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رسالة إلى منى</title>

<style>
body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    font-family: Arial;
    text-align:center;
    color:white;
    margin-top:120px;
}

h1{
    font-size:40px;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff4b5c;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff1e38;
    transform:scale(1.1);
}

#message{
    margin-top:40px;
    font-size:28px;
    display:none;
    animation:fade 2s;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<h1>رسالة خاصة إلى منى</h1>

<button onclick="showMessage()">اضغطي هنا</button>

<div id="message">
💔 منى... أحياناً يجب أن نترك بعض المشاعر تمضي.<br><br>
محمد لن يحبك أبداً، والأفضل أن تهتمي بنفسك<br>
وتبحثي عن شخص يقدّرك ويحبك بصدق.
</div>

<script>
function showMessage(){
    document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
